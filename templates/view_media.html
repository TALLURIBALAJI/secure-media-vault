<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Media - Secure Media Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1633 0%, #0d0b1a 50%, #000000 100%);
            color: #ffffff;
            padding: 20px;
        }

        /* Red glow background */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
            animation: orbPulse 10s ease-in-out infinite;
        }

        .glow-orb-1 {
            width: 500px;
            height: 500px;
            background: #dc2626;
            top: -150px;
            left: -150px;
        }

        .glow-orb-2 {
            width: 400px;
            height: 400px;
            background: #991b1b;
            bottom: -150px;
            right: -150px;
            animation-delay: 5s;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.12; }
            50% { transform: scale(1.3); opacity: 0.2; }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 15px 15px 0 0;
            padding: 25px 35px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-bottom: none;
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .file-title {
            color: #ffffff;
            font-size: 1.5em;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 10px 25px;
            font-size: 0.9em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            transition: all 0.4s ease;
            border: 2px solid;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-dashboard {
            background: transparent;
            color: #9ca3af;
            border-color: rgba(156, 163, 175, 0.5);
        }

        .btn-dashboard:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #ffffff;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .btn-delete {
            background: transparent;
            color: #dc2626;
            border-color: rgba(220, 38, 38, 0.5);
        }

        .btn-delete:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
            transform: translateY(-2px);
        }

        /* Media viewer */
        .media-viewer {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 0 0 15px 15px;
            padding: 40px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.2);
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .media-content {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        video,
        img {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            border: 2px solid rgba(220, 38, 38, 0.3);
            box-shadow: 
                0 0 40px rgba(220, 38, 38, 0.3),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
        }

        video {
            background: #000000;
        }

        .file-name-display {
            margin-top: 25px;
            color: #9ca3af;
            font-size: 1em;
            letter-spacing: 1px;
        }

        .file-name-display strong {
            color: #ffffff;
        }

        /* Warning message */
        .warning-box {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            text-align: center;
        }

        .warning-box p {
            color: #9ca3af;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .warning-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header {
                padding: 20px 25px;
                flex-direction: column;
                text-align: center;
            }

            .file-title {
                font-size: 1.2em;
            }

            .action-buttons {
                width: 100%;
                justify-content: center;
            }

            .btn {
                flex: 1;
            }

            .media-viewer {
                padding: 25px 20px;
            }

            video,
            img {
                max-height: 50vh;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 15px 20px;
            }

            .file-title {
                font-size: 1em;
            }

            .media-viewer {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Glow orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Container -->
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="file-title">
                🎬 {{ filename }}
            </div>
            <div class="action-buttons">
                <a href="/dashboard" class="btn btn-dashboard">← Dashboard</a>
                <a href="/delete_verify/{{ filename }}" class="btn btn-delete">Delete</a>
            </div>
        </div>

        <!-- Media viewer -->
        <div class="media-viewer">
            <div class="media-content">
                {% if file_type == 'video' %}
                <video controls autoplay>
                    <source src="/media/{{ filename }}" type="video/{{ filename.split('.')[-1] }}">
                    Your browser does not support the video tag.
                </video>
                {% elif file_type == 'image' %}
                <img src="/media/{{ filename }}" alt="{{ filename }}">
                {% endif %}

                <div class="file-name-display">
                    <strong>File:</strong> {{ filename }}
                </div>

                <div class="warning-box">
                    <div class="warning-icon">🔒</div>
                    <p>
                        This media is stored securely in your vault. 
                        Only you can access this content with proper authentication.
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
