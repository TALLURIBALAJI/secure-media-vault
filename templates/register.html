<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Secure Media Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse at center, #1a1633 0%, #0d0b1a 50%, #000000 100%);
            position: relative;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(220, 38, 38, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 3s; animation-duration: 25s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 6s; animation-duration: 18s; }
        .particle:nth-child(4) { left: 55%; animation-delay: 9s; animation-duration: 22s; }
        .particle:nth-child(5) { left: 70%; animation-delay: 12s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 85%; animation-delay: 15s; animation-duration: 19s; }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Red glow effects */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            animation: orbPulse 8s ease-in-out infinite;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: #dc2626;
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .glow-orb-2 {
            width: 350px;
            height: 350px;
            background: #991b1b;
            bottom: -100px;
            left: -100px;
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.25; }
        }

        /* Register container */
        .register-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card */
        .register-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 50px 40px;
            box-shadow: 
                0 0 60px rgba(220, 38, 38, 0.3),
                inset 0 0 80px rgba(220, 38, 38, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        h2 {
            font-size: 2.5em;
            color: #ffffff;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 0.95em;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Shield icon */
        .shield-icon {
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 25px;
            animation: rotate360 4s ease-in-out infinite;
        }

        @keyframes rotate360 {
            0%, 100% {
                transform: rotate(0deg);
            }
            50% {
                transform: rotate(10deg);
            }
        }

        /* Security info */
        .security-info {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .security-info h3 {
            color: #dc2626;
            font-size: 1em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .security-info p {
            color: #d1d5db;
            font-size: 0.85em;
            line-height: 1.5;
        }

        /* Form */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #d1d5db;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: #6b7280;
        }

        /* Button */
        .btn-register {
            width: 100%;
            padding: 16px;
            background: #dc2626;
            color: white;
            border: 2px solid #dc2626;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-register::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn-register:hover::before {
            left: 100%;
        }

        .btn-register:hover {
            background: #b91c1c;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.6);
            transform: translateY(-2px);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        /* Link */
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #9ca3af;
            font-size: 0.9em;
        }

        .login-link a {
            color: #dc2626;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ef4444;
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.6);
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link a:hover {
            color: #ffffff;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .register-card {
                padding: 40px 30px;
            }

            h2 {
                font-size: 2em;
            }

            .shield-icon {
                font-size: 3em;
            }
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 30px 20px;
            }

            h2 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Glow orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Register Container -->
    <div class="register-container">
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
        <div class="register-card">
            <div class="shield-icon">🛡️</div>
            <h2>Register</h2>
            <p class="subtitle">Create Your Secure Vault</p>

            <div class="security-info">
                <h3>🔒 Triple-Layer Security</h3>
                <p>You will set three separate passwords for maximum protection:</p>
                <p style="margin-top: 8px;">
                    <strong>1. Login Password</strong> - Access your vault<br>
                    <strong>2. View Password</strong> - View your media<br>
                    <strong>3. Delete Password</strong> - Remove media files
                </p>
            </div>

            <form method="POST" action="/register">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="login_password">Login Password</label>
                    <input type="password" id="login_password" name="login_password" placeholder="For vault access" required>
                </div>

                <div class="form-group">
                    <label for="view_password">View Password</label>
                    <input type="password" id="view_password" name="view_password" placeholder="For viewing media" required>
                </div>

                <div class="form-group">
                    <label for="delete_password">Delete Password</label>
                    <input type="password" id="delete_password" name="delete_password" placeholder="For deleting media" required>
                </div>

                <button type="submit" class="btn-register">Create Vault</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="/login">Login Here</a>
            </div>
        </div>
    </div>
</body>
</html>
