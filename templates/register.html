<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>User Registration</h2>

<form method="POST">
    
    <label>Username</label><br>
    <input type="text" name="username" required><br><br>

    <label>Login Password</label><br>
    <input type="password" name="login_password" required><br><br>

    <label>View Password</label><br>
    <input type="password" name="view_password" required><br><br>

    <label>Delete Password</label><br>
    <input type="password" name="delete_password" required><br><br>

    <button type="submit">Register</button>

</form>

</body>
</html>
