<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Media Vault - Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse at center, #1a1633 0%, #0d0b1a 50%, #000000 100%);
            position: relative;
            color: #ffffff;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(220, 38, 38, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 3s; animation-duration: 25s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 6s; animation-duration: 18s; }
        .particle:nth-child(4) { left: 55%; animation-delay: 9s; animation-duration: 22s; }
        .particle:nth-child(5) { left: 70%; animation-delay: 12s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 85%; animation-delay: 15s; animation-duration: 19s; }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Red glow effects */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            animation: orbPulse 8s ease-in-out infinite;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: #dc2626;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .glow-orb-2 {
            width: 350px;
            height: 350px;
            background: #991b1b;
            bottom: -100px;
            right: -100px;
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.25; }
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.6);
            border-bottom: 1px solid rgba(220, 38, 38, 0.2);
        }

        .logo {
            font-size: 1.8em;
            font-weight: 900;
            color: #dc2626;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: #dc2626;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: #dc2626;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Hero section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px 50px;
            z-index: 10;
        }

        /* Main title with brush stroke effect */
        .main-title {
            font-size: clamp(3em, 10vw, 7em);
            font-weight: 900;
            color: transparent;
            background: linear-gradient(45deg, #ffffff 30%, #dc2626 70%);
            -webkit-background-clip: text;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite;
            transform: skew(-5deg);
            text-shadow: 
                0 0 30px rgba(220, 38, 38, 0.5),
                0 0 60px rgba(220, 38, 38, 0.3);
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 20px rgba(220, 38, 38, 0.6));
            }
            50% {
                filter: brightness(1.2) drop-shadow(0 0 40px rgba(220, 38, 38, 0.9));
            }
        }

        .subtitle {
            font-size: 1.5em;
            color: #a1a1aa;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 2px;
            animation: fadeInUp 1.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats section */
        .stats {
            display: flex;
            gap: 60px;
            margin: 40px 0;
            animation: fadeInUp 2s ease-out;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 3em;
            font-weight: 900;
            color: #dc2626;
            text-shadow: 0 0 30px rgba(220, 38, 38, 0.8);
        }

        .stat-label {
            font-size: 0.9em;
            color: #9ca3af;
            margin-top: 5px;
            font-weight: 600;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            animation: fadeInUp 2.5s ease-out;
        }

        .btn {
            text-decoration: none;
            padding: 18px 50px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-login {
            background: #dc2626;
            color: white;
            border-color: #dc2626;
        }

        .btn-login:hover {
            background: #b91c1c;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.6);
            transform: translateY(-3px);
        }

        .btn-register {
            background: transparent;
            color: white;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-register:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateY(-3px);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .main-title {
                font-size: 4em;
                letter-spacing: 4px;
            }

            .subtitle {
                font-size: 1.2em;
            }

            .stats {
                gap: 40px;
            }

            .stat-number {
                font-size: 2.5em;
            }

            .action-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            nav {
                padding: 15px 3%;
            }

            .logo {
                font-size: 1.4em;
            }

            .nav-links {
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2.5em;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 1em;
            }

            .stats {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Glow orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Navigation -->
    <nav>
        <div class="logo">🗡️ SECURE VAULT</div>
        <ul class="nav-links">
            <li><a href="#security">Security</a></li>
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
        </ul>
    </nav>

    <!-- Hero section -->
    <section class="hero">
        <h1 class="main-title">SECURE<br>MEDIA<br>VAULT</h1>
        <p class="subtitle">ULTIMATE PROTECTION FOR YOUR DIGITAL ASSETS</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-number">256</div>
                <div class="stat-label">Bit Encryption</div>
            </div>
            <div class="stat">
                <div class="stat-number">100%</div>
                <div class="stat-label">Secure Storage</div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="/login" class="btn btn-login">ENTER VAULT</a>
            <a href="/register" class="btn btn-register">CREATE ACCOUNT</a>
        </div>
    </section>
</body>
</html>
