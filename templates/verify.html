<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification - Secure Media Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(ellipse at center, #1a1633 0%, #0d0b1a 50%, #000000 100%);
            position: relative;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Animated background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(220, 38, 38, 0.6);
            border-radius: 50%;
            animation: particleFloat 15s infinite ease-in-out;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
        .particle:nth-child(2) { left: 25%; animation-delay: 3s; animation-duration: 25s; }
        .particle:nth-child(3) { left: 40%; animation-delay: 6s; animation-duration: 18s; }
        .particle:nth-child(4) { left: 55%; animation-delay: 9s; animation-duration: 22s; }
        .particle:nth-child(5) { left: 70%; animation-delay: 12s; animation-duration: 24s; }
        .particle:nth-child(6) { left: 85%; animation-delay: 15s; animation-duration: 19s; }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Red glow effects */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            animation: orbPulse 8s ease-in-out infinite;
        }

        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: #dc2626;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .glow-orb-2 {
            width: 350px;
            height: 350px;
            background: #991b1b;
            bottom: -100px;
            right: -100px;
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0%, 100% { transform: scale(1); opacity: 0.15; }
            50% { transform: scale(1.2); opacity: 0.25; }
        }

        /* Verify container */
        .verify-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card */
        .verify-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 50px 40px;
            box-shadow: 
                0 0 60px rgba(220, 38, 38, 0.3),
                inset 0 0 80px rgba(220, 38, 38, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        h2 {
            font-size: 2.5em;
            color: #ffffff;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            font-size: 0.95em;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Error message */
        .error-message {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid #dc2626;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 25px;
            color: #fca5a5;
            font-size: 0.95em;
            text-align: center;
            font-weight: 600;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Shield icon */
        .shield-icon {
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 25px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        /* Timer */
        .timer-display {
            background: rgba(220, 38, 38, 0.2);
            border: 2px solid #dc2626;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .timer-label {
            color: #9ca3af;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .timer-value {
            font-size: 3em;
            font-weight: 900;
            color: #dc2626;
            text-shadow: 0 0 30px rgba(220, 38, 38, 0.8);
            font-family: 'Courier New', monospace;
        }

        .timer-expired {
            color: #991b1b !important;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Question box */
        .question-box {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .question-box h3 {
            color: #dc2626;
            font-size: 1em;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .question-text {
            color: #ffffff;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 25px;
        }

        .form-divider {
            text-align: center;
            color: #6b7280;
            font-size: 0.9em;
            margin: 25px 0;
            position: relative;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(220, 38, 38, 0.3);
        }

        .form-divider::before {
            left: 0;
        }

        .form-divider::after {
            right: 0;
        }

        label {
            display: block;
            color: #d1d5db;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: #6b7280;
        }

        /* Button */
        .btn-verify {
            width: 100%;
            padding: 16px;
            background: #dc2626;
            color: white;
            border: 2px solid #dc2626;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-verify::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn-verify:hover::before {
            left: 100%;
        }

        .btn-verify:hover {
            background: #b91c1c;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.6);
            transform: translateY(-2px);
        }

        .btn-verify:active {
            transform: translateY(0);
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-bottom: 20px;
        }

        .back-link a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .back-link a:hover {
            color: #ffffff;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .verify-card {
                padding: 40px 30px;
            }

            h2 {
                font-size: 2em;
            }

            .shield-icon {
                font-size: 3em;
            }

            .timer-value {
                font-size: 2.5em;
            }
        }

        @media (max-width: 480px) {
            .verify-card {
                padding: 30px 20px;
            }

            h2 {
                font-size: 1.8em;
            }

            .question-text {
                font-size: 1.1em;
            }
        }
    </style>
    <script>
        // Initialize timer with server-provided value
        let timeRemaining = parseInt('{{ time_remaining }}', 10) || 0;
        
        function updateTimer() {
            if (timeRemaining > 0) {
                timeRemaining--;
                const timerElement = document.getElementById('timer');
                if (timerElement) {
                    timerElement.textContent = timeRemaining + 's';
                    
                    if (timeRemaining <= 5) {
                        timerElement.classList.add('timer-expired');
                    }
                }
            } else {
                location.reload();
            }
        }
        
        // Update timer every second
        setInterval(updateTimer, 1000);
    </script>
</head>
<body>
    <!-- Animated particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Glow orbs -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- Verify Container -->
    <div class="verify-container">
        <div class="back-link">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>
        <div class="verify-card">
            <div class="shield-icon">⚔️</div>
            <h2>Verification</h2>
            <p class="subtitle">Prove Your Identity to Access</p>

            {% if error %}
            <div class="error-message">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <!-- Timer -->
            <div class="timer-display">
                <div class="timer-label">Time Remaining</div>
                <div class="timer-value" id="timer">{{ time_remaining }}s</div>
            </div>

            <form method="POST" action="/verify/{{ filename }}">
                <!-- Math question -->
                <div class="question-box">
                    <h3>🧮 Solve the Challenge</h3> 
<div class="question-text">{{ question[0] }} = ?</div>
                </div>

                <div class="form-group">
                    <label for="answer">Your Answer</label>
                    <input type="text" id="answer" name="answer" placeholder="Enter the answer" autocomplete="off">
                </div>

                <div class="form-divider">OR</div>

                <div class="form-group">
                    <label for="view_password">View Password</label>
                    <input type="password" id="view_password" name="view_password" placeholder="Enter your view password">
                </div>

                <button type="submit" class="btn-verify">Verify & Access</button>
            </form>
        </div>
    </div>
</body>
</html>
