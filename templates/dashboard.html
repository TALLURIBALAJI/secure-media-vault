<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
    font-family: Arial;
}

.file-list{
    width:70%;
}

.file-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ccc;
    padding:10px 0;
}

.file-name{
    font-size:16px;
}

.view-btn{
    padding:6px 14px;
    background-color:#007bff;
    color:white;
    text-decoration:none;
    border-radius:4px;
}

.view-btn:hover{
    background-color:#0056b3;
}

</style>

</head>

<body>

<h2>Secure Media Vault</h2>

<p>Welcome {{username}}</p>

<a href="/upload">Upload Media</a>

<br><br>

<div class="file-list">

{% for file in files %}

<div class="file-row">

<span class="file-name">{{file}}</span>

<a class="view-btn" href="/verify/{{file}}">View</a>

</div>

{% endfor %}

</div>

<br>

<a href="/logout">Logout</a>

</body>
</html>
